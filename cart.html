<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Кошик та Чат — SealShop</title>
    <style>
        :root {
            --primary-blue: #a2d2ff;
            --dark-blue: #0077b6;
            --chat-bg: #f0f7ff;
        }
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f8f9fa; color: #333; }
        .cart-container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dotted #ccc; padding: 15px 0; }
        .item img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        
        .total { font-size: 1.6rem; font-weight: bold; margin-top: 20px; text-align: right; color: var(--dark-blue); }
        
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-order { background: #28a745; color: white; }
        .btn-clear { background: #eee; color: #666; }
        .btn-order:hover { background: #218838; }

        /* ЧАТ */
        #chat-window { display: none; margin-top: 20px; border-radius: 15px; overflow: hidden; border: 1px solid #ddd; }
        .chat-header { background: var(--dark-blue); color: white; padding: 12px; font-weight: bold; text-align: center; }
        #chat-messages { height: 300px; padding: 15px; overflow-y: auto; background: var(--chat-bg); display: flex; flex-direction: column; gap: 8px; }
        
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 85%; font-size: 0.95rem; line-height: 1.4; }
        .msg-dev { background: white; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .msg-user { background: var(--dark-blue); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

        .chat-input { display: flex; padding: 10px; background: white; border-top: 1px solid #eee; gap: 8px; }
        .chat-input input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .chat-input button { background: var(--primary-blue); border: none; padding: 0 15px; border-radius: 20px; cursor: pointer; color: white; font-weight: bold; }

        .back-link { display: block; text-align: center; margin-top: 20px; color: #999; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="cart-container">
    <div id="cart-section">
        <h1 style="margin-top:0">Кошик 🛒</h1>
        <div id="list"></div>
        <div id="empty-msg" style="display:none; text-align:center; padding: 40px 0; color:#aaa;">Тюлені чекають на замовлення...</div>
        
        <div id="cart-footer">
            <div class="total">До сплати: <span id="sum">0</span> грн</div>
            <button class="btn-action btn-order" onclick="startChat()">Оформити та написати нам</button>
            <button class="btn-action btn-clear" onclick="clearCart()">Очистити список</button>
        </div>
    </div>

    <div id="chat-window">
        <div class="chat-header">Чат з SealShop 🦭</div>
        <div id="chat-messages">
            <div class="msg msg-dev">Вітаємо! Ми отримали ваше замовлення. Напишіть, будь ласка, адресу для доставки.</div>
        </div>
        <div class="chat-input">
            <input type="text" id="user-text" placeholder="Ваше повідомлення...">
            <button onclick="sendMsg()">></button>
        </div>
    </div>

    <a href="index.html" class="back-link">Повернутися до каталогу</a>
</div>

<script>
    function updateUI() {
        let cart = JSON.parse(localStorage.getItem('sealCart')) || [];
        let list = document.getElementById('list');
        let footer = document.getElementById('cart-footer');
        let empty = document.getElementById('empty-msg');
        let sum = 0;

        list.innerHTML = '';
        if (cart.length === 0) {
            empty.style.display = 'block';
            footer.style.display = 'none';
        } else {
            empty.style.display = 'none';
            footer.style.display = 'block';
            cart.forEach(item => {
                sum += item.price;
                list.innerHTML += `
                    <div class="item">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="${item.image}">
                            <span>${item.name}</span>
                        </div>
                        <b>${item.price} грн</b>
                    </div>`;
            });
            document.getElementById('sum').innerText = sum;
        }
    }

    function clearCart() {
        localStorage.removeItem('sealCart');
        updateUI();
    }

    function startChat() {
        const cart = JSON.parse(localStorage.getItem('sealCart')) || [];
        if(cart.length === 0) return;

        document.getElementById('cart-section').style.display = 'none';
        document.getElementById('chat-window').style.display = 'block';
        
        let orderNames = cart.map(i => i.name).join(", ");
        addMsg(`Привіт! Я хочу замовити: ${orderNames}`, 'user');
        
        localStorage.removeItem('sealCart'); 
    }

    function sendMsg() {
        let input = document.getElementById('user-text');
        if (!input.value.trim()) return;

        addMsg(input.value, 'user');
        
        setTimeout(() => {
            addMsg("Чудово! Ваше замовлення прийнято в роботу. Очікуйте на доставку! 🦭📦", 'dev');
        }, 1200);

        input.value = "";
    }

    function addMsg(text, type) {
        let box = document.getElementById('chat-messages');
        let div = document.createElement('div');
        div.className = `msg msg-${type}`;
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('user-text').addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMsg();
    });

    updateUI();
</script>

</body>
</html>

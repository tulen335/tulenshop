<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Кошик — SealShop</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f4f8; color: #333; }
        .cart-container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 15px 0; }
        .item img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; }
        .total { font-size: 1.8rem; font-weight: bold; margin-top: 25px; text-align: right; color: #0077b6; }
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-order { background: #28a745; color: white; }
        .btn-clear { background: #ff4d4d; color: white; }
        
        /* Блок контактов разработчика */
        #contact-dev { display: none; margin-top: 30px; padding: 20px; background: #e3f2fd; border-radius: 15px; text-align: center; border: 2px dashed #0077b6; }
        .dev-link { display: inline-block; margin-top: 10px; padding: 10px 20px; background: #0088cc; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
<div class="cart-container">
    <h1>Твій кошик 🛒</h1>
    <div id="list"></div>
    <div id="empty-msg" style="display:none; text-align:center; color:#888; padding: 20px;">Тут порожньо...</div>
    
    <div id="cart-footer">
        <div class="total">Разом: <span id="sum">0</span> грн</div>
        <button class="btn-action btn-order" onclick="showContacts()">Оформити замовлення</button>
        <button class="btn-action btn-clear" onclick="clearCart()">Очистити кошик</button>
    </div>

    <div id="contact-dev">
        <h3>🎉 Замовлення прийнято!</h3>
        <p>Щоб підтвердити замовлення та обговорити доставку, напишіть розробнику:</p>
        <a href="https://t.me/your_username" target="_blank" class="dev-link">Написати у Telegram ✈️</a>
        <p style="font-size: 0.9rem; margin-top: 10px; color: #666;">Або Instagram: <strong>@your_insta</strong></p>
        <br>
        <button onclick="location.href='index.html'" style="cursor:pointer; background:none; border:none; color:#0077b6; text-decoration:underline;">Повернутися до магазину</button>
    </div>

    <p style="text-align:center; margin-top: 20px;"><a href="index.html" style="color:#0077b6;">← Назад до каталогу</a></p>
</div>

<script>
    function renderCart() {
        let cart = JSON.parse(localStorage.getItem('sealCart')) || [];
        let list = document.getElementById('list');
        let footer = document.getElementById('cart-footer');
        let empty = document.getElementById('empty-msg');
        let sum = 0;

        list.innerHTML = '';
        if (cart.length === 0) {
            empty.style.display = 'block';
            footer.style.display = 'none';
        } else {
            empty.style.display = 'none';
            footer.style.display = 'block';
            cart.forEach(item => {
                sum += item.price;
                list.innerHTML += `
                    <div class="item">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="${item.image}">
                            <span>${item.name}</span>
                        </div>
                        <b>${item.price} грн</b>
                    </div>`;
            });
            document.getElementById('sum').innerText = sum;
        }
    }

    function clearCart() {
        localStorage.removeItem('sealCart');
        renderCart();
    }

    function showContacts() {
        // Скрываем кошик и показываем контакты
        document.getElementById('list').style.display = 'none';
        document.getElementById('cart-footer').style.display = 'none';
        document.getElementById('contact-dev').style.display = 'block';
        
        // Очищаем кошик (заказ ведь уже "сделан")
        localStorage.removeItem('sealCart');
    }

    renderCart();
</script>
</body>
</html>

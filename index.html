<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SealShop — Головна</title>
    <style>
        :root { --primary-blue: #a2d2ff; --dark-blue: #0077b6; --soft-white: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--soft-white); }
        header { background: var(--primary-blue); color: white; padding: 2rem; text-align: center; }
        header a { color: white; text-decoration: none; border: 1px solid white; padding: 8px 20px; border-radius: 20px; transition: 0.3s; }
        header a:hover { background: white; color: var(--primary-blue); }
        .catalog { max-width: 1100px; margin: 3rem auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; padding: 0 1rem; }
        .product-card { background: white; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); text-align: center; overflow: hidden; transition: 0.3s; }
        .product-card:hover { transform: translateY(-8px); }
        .img-box { height: 250px; background: #e0f2fe; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 1.5rem; }
        .price { font-size: 1.4rem; font-weight: bold; color: var(--dark-blue); display: block; margin: 1rem 0; }
        .btn-view { display: inline-block; background: var(--primary-blue); color: white; text-decoration: none; padding: 0.8rem 2rem; border-radius: 25px; font-weight: bold; }
    </style>
</head>
<body>
<header>
    <h1>🦭 SealShop</h1>
    <p>Найкращі тюлені України</p>
    <br>
    <a href="cart.html">🛒 Мій кошик</a>
</header>
<div class="catalog">
    <div class="product-card">
        <div class="img-box"><img src="seal.jpeg" alt="Класичний"></div>
        <div class="info">
            <h3>Класичний Тюлень</h3>
            <span class="price">550 грн</span>
            <a href="product.html" class="btn-view">Дивитись</a>
        </div>
    </div>
    <div class="product-card">
        <div class="img-box"><img src="tf2_seal.jpeg" alt="TF2"></div>
        <div class="info">
            <h3>Тюлень із TF2</h3>
            <span class="price">750 грн</span>
            <a href="tf2_product.html" class="btn-view">Дивитись</a>
        </div>
    </div>
</div>
</body>
</html>
